<body>
<div id="app"></div>

<script>
/* ---------------- constants ---------------- */
const QUESTIONS = [
  "好きな動物は?","朝ごはんに食べたいものは?","今の気分を一言で","行ってみたい国は?","好きな色は?",
  "休日にしたいことは?","好きな季節は?","食べたいラーメンの種類は?","苦手な食べ物は?","行きたい国内旅行先は?",
  "好きなスポーツは?","飼いたいペットは?","好きな飲み物は?","得意料理は?","好きな映画のジャンルは?",
  "コンビニでよく買うものは?","好きな漫画・アニメのジャンルは?","好きな数字(1〜9)は?","好きな曜日は?",
  "テンションが上がる音楽ジャンルは?","好きなお菓子は?","行ってみたいテーマパークは?","好きな花は?",
  "好きな天気は?","好きな時間帯は?","好きな乗り物は?","欲しい家電は?","好きな野菜は?","好きな果物は?",
  "苦手な虫は?","好きな寿司ネタは?","好きなアイスの味は?","行きたい世界遺産は?","好きな絵文字は?",
  "好きなカフェメニューは?","好きな麺料理は?","無人島に持っていきたいものは?","好きなパンの種類は?",
  "理想の休日の過ごし方は?","好きな鍋の具材は?","子供の頃の夢は?","好きな星座は?","好きな匂いは?",
  "旅行に必ず持っていくものは?","好きなお正月の食べ物は?","好きな夏の思い出は?"
];
const PLAYER_COLORS = ['#FF6B6B','#FFA94D','#FFD93D','#6BCB77','#4DCCBD','#4D96FF','#7C7CFF','#C77DFF','#FF7DC0','#FF9F7D'];
const GROUP_COLORS = ['#FFC94D','#4DCCBD','#FF7DC0','#4D96FF','#7C7CFF','#6BCB77'];
const MAX_PLAYERS = 10;
const REACTION_EMOJI = ['👍','😂','🤔'];
const THEME_LABELS = { all:'すべて', food:'🍜 食べ物', travel:'✈️ 旅行', preference:'💭 好み', daily:'🏠 日常' };
const SESSION_KEY = 'matchgame_session_v1';

/* お題を大まかなテーマに自動分類する(既存45問のタグ付けを手作業でせずに済ませるため) */
function classifyTheme(q){
  const foodKw = ['食べ','ラーメン','お菓子','寿司','アイス','カフェ','麺','パン','鍋','野菜','果物','飲み物','料理'];
  const travelKw = ['国','旅行','テーマパーク','世界遺産','無人島'];
  const dailyKw = ['休日','コンビニ','家電','気分'];
  if(foodKw.some(k=>q.includes(k))) return 'food';
  if(travelKw.some(k=>q.includes(k))) return 'travel';
  if(dailyKw.some(k=>q.includes(k))) return 'daily';
  return 'preference';
}

/* ---------------- state ---------------- */
let state = {
  screen:'home', tab:'create',
  myId:null, myName:'', roomCode:null, isHost:false,
  meta:null, players:[], answersMap:{}, myAnswerSubmitted:false,
  errorMsg:'', busy:false,
  reactionsMap:{}, myReactions:{}, showHistory:false, lastCelebratedRound:null,
  prefillCode:'', timerRoundHandled:null, openMenuPlayerId:null,
};
let pollTimer = null;
let clockTimer = null;
let lastRenderKey = null;
let draftAnswer = '';

/* ---------------- local session (再接続用) ---------------- */
function saveSession(){
  try{ localStorage.setItem(SESSION_KEY, JSON.stringify({ roomCode:state.roomCode, myId:state.myId, savedAt:Date.now() })); }
  catch(e){}
}
function loadSession(){
  try{ const raw = localStorage.getItem(SESSION_KEY); return raw ? JSON.parse(raw) : null; }
  catch(e){ return null; }
}
function clearSession(){
  try{ localStorage.removeItem(SESSION_KEY); }catch(e){}
}

/* ---------------- storage helpers ---------------- */
function genId(len=8){
  const chars='abcdefghijklmnopqrstuvwxyz0123456789';
  let s=''; for(let i=0;i<len;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
function genRoomCode(){
  const chars='ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  let s=''; for(let i=0;i<4;i++) s+=chars[Math.floor(Math.random()*chars.length)];
  return s;
}
/*
  ▼▼▼ ここに自分の Firebase プロジェクトの設定を貼り付けてください ▼▼▼
  Firebaseコンソール > プロジェクトの設定 > マイアプリ(ウェブアプリ)で発行される
  firebaseConfig オブジェクトをそのままコピー&ペーストします。
*/
const firebaseConfig = {
  apiKey: "AIzaSyCSv3vPmLSePyHtMrlcwAeOjGFavhiCQmI",
  authDomain: "match-game-83315.firebaseapp.com",
  databaseURL: "https://match-game-83315-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "match-game-83315",
  storageBucket: "match-game-83315.firebasestorage.app",
  messagingSenderId: "896174497714",
  appId: "1:896174497714:web:6c0e05dc88b2b7902c4eab"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// key例: "room:ABCD:player:xyz" -> Realtime Database のパス "room/ABCD/player/xyz"
function keyToPath(key){ return key.replace(/:/g, '/'); }

async function sGet(key){
  try{
    const snap = await db.ref(keyToPath(key)).get();
    return snap.exists() ? snap.val() : null;
  }catch(e){ console.error(e); return null; }
}
async function sSet(key, val){
  try{ await db.ref(keyToPath(key)).set(val); return true; }
  catch(e){ console.error(e); showError('通信エラーが発生しました。もう一度お試しください。'); return false; }
}
async function sDelete(key){
  try{ await db.ref(keyToPath(key)).remove(); }catch(e){ console.error(e); }
}
async function sList(prefix){
  // prefix は末尾が ":" (例: "room:ABCD:player:") — 一つ上の階層のパスとして子キー一覧を取得する
  try{
    const parentPath = keyToPath(prefix.slice(0, -1));
    const snap = await db.ref(parentPath).get();
    if(!snap.exists()) return [];
    const keys = [];
    snap.forEach(child => { keys.push(prefix + child.key); });
    return keys;
  }catch(e){ console.error(e); return []; }
}
function showError(msg){ state.errorMsg = msg; render(true); setTimeout(()=>{ state.errorMsg=''; render(true); }, 3500); }

/* ---------------- room key helpers ---------------- */
const kMeta = c => `room:${c}:meta`;
const kPlayerPrefix = c => `room:${c}:player:`;
const kPlayer = (c,id) => `room:${c}:player:${id}`;
const kAnswerPrefix = (c,gid,round) => `room:${c}:answer:${gid}:${round}:`;
const kAnswer = (c,gid,round,id) => `room:${c}:answer:${gid}:${round}:${id}`;
// tileIdx と playerId は "_" で1セグメントに詰める(sList は1階層下の子キーしか列挙できないため)
const kReactionPrefix = (c,gid,round) => `room:${c}:reaction:${gid}:${round}:`;
const kReaction = (c,gid,round,tileIdx,id) => `room:${c}:reaction:${gid}:${round}:${tileIdx}_${id}`;

/* ---------------- normalization / scoring ---------------- */
function normalize(s){ return (s||'').trim().replace(/\s+/g,'').toLowerCase(); }

function computeTiles(players, answersMap){
  const groups = {}; // normalized -> [playerId]
  players.forEach(p=>{
    const a = answersMap[p.id];
    if(!a || !a.answer || !a.answer.trim()) return;
    const n = normalize(a.answer);
    if(!groups[n]) groups[n]=[];
    groups[n].push(p.id);
  });
  const groupList = Object.entries(groups).map(([norm, ids])=>({norm, ids}));
  groupList.sort((a,b)=> b.ids.length - a.ids.length);
  let colorIdx = 0;
  const tiles = [];
  const pointsMap = {};
  groupList.forEach(g=>{
    const isMatch = g.ids.length >= 2;
    const isPerfect = isMatch && g.ids.length === players.length && players.length >= 2;
    const pts = isMatch ? (g.ids.length + (isPerfect ? 5 : 0)) : 0;
    const color = isMatch ? GROUP_COLORS[colorIdx % GROUP_COLORS.length] : null;
    if(isMatch) colorIdx++;
    g.ids.forEach(id=> pointsMap[id]=pts);
    tiles.push({ answer: answersMap[g.ids[0]].answer, ids:g.ids, isMatch, isPerfect, pts, color });
  });
  // players with no answer
  players.forEach(p=>{
    if(!answersMap[p.id]) pointsMap[p.id]=0;
  });
  return { tiles, pointsMap };
}

/* ---------------- question pool (テーマ) ---------------- */
function themePool(meta){
  const theme = meta.theme || 'all';
  if(theme === 'all') return QUESTIONS.slice();
  return QUESTIONS.filter(q => classifyTheme(q) === theme);
}
function pickQuestion(meta){
  const pool = themePool(meta);
  const used = meta.usedQuestions || [];
  const remaining = pool.filter(q => !used.includes(q));
  const finalPool = remaining.length ? remaining : (pool.length ? pool : QUESTIONS);
  return finalPool[Math.floor(Math.random()*finalPool.length)];
}

/* ---------------- badges (称号) ---------------- */
function computeBadges(meta, players){
  const history = (meta && meta.roundHistory) || [];
  if(!history.length || players.length < 2) return [];
  const perfectCount={}, matchCount={}, playedCount={}, speedSum={}, speedN={};
  players.forEach(p=>{ perfectCount[p.id]=0; matchCount[p.id]=0; playedCount[p.id]=0; speedSum[p.id]=0; speedN[p.id]=0; });
  history.forEach(h=>{
    (h.tiles||[]).forEach(t=>{
      (t.ids||[]).forEach(id=>{
        if(!(id in matchCount)) return;
        playedCount[id]++;
        if(t.isMatch) matchCount[id]++;
        if(t.isPerfect) perfectCount[id]++;
      });
    });
    if(h.answers && h.startedAt){
      Object.entries(h.answers).forEach(([id, a])=>{
        if(a && a.submittedAt && id in speedSum){ speedSum[id]+=(a.submittedAt-h.startedAt); speedN[id]++; }
      });
    }
  });
  const badges = [];
  let topPerfect=null;
  players.forEach(p=>{ if(perfectCount[p.id]>0 && (!topPerfect || perfectCount[p.id]>perfectCount[topPerfect.id])) topPerfect=p; });
  if(topPerfect) badges.push({ emoji:'🎯', title:'全員一致マスター', name:topPerfect.name, desc:`${perfectCount[topPerfect.id]}回、全員一致に貢献` });

  let topMatch=null;
  players.forEach(p=>{ if(matchCount[p.id]>0 && (!topMatch || matchCount[p.id]>matchCount[topMatch.id])) topMatch=p; });
  if(topMatch) badges.push({ emoji:'🔥', title:'コンボ王', name:topMatch.name, desc:`${matchCount[topMatch.id]}回、答えが一致` });

  const soloers = players.filter(p=> playedCount[p.id]>0 && matchCount[p.id]===0);
  if(soloers.length) badges.push({ emoji:'🦄', title:'ひとり我が道', name: soloers.map(p=>p.name).join('・'), desc:'一度も答えが一致しなかった' });

  let fastest=null;
  players.forEach(p=>{
    if(speedN[p.id]>0){
      const avg = speedSum[p.id]/speedN[p.id];
      if(!fastest || avg<fastest.avg) fastest = { name:p.name, avg };
    }
  });
  if(fastest) badges.push({ emoji:'⚡', title:'最速回答賞', name:fastest.name, desc:`平均 ${(fastest.avg/1000).toFixed(1)}秒で回答` });

  return badges;
}

/* ---------------- 演出(全員一致) ---------------- */
function celebrate(){
  spawnConfetti();
  try{ playChime(); }catch(e){}
}
function spawnConfetti(){
  const colors=['#FFC94D','#FF6B6B','#6BCB77','#4D96FF','#C77DFF','#4DCCBD'];
  const layer = document.createElement('div');
  layer.className = 'confetti-layer';
  document.body.appendChild(layer);
  const N = 70;
  for(let i=0;i<N;i++){
    const el = document.createElement('span');
    el.className = 'confetti-piece';
    el.style.left = (Math.random()*100)+'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.animationDuration = (2.2+Math.random()*1.6)+'s';
    el.style.animationDelay = (Math.random()*0.4)+'s';
    layer.appendChild(el);
  }
  setTimeout(()=>{ layer.remove(); }, 4200);
}
function playChime(){
  const Ctx = window.AudioContext || window.webkitAudioContext;
  if(!Ctx) return;
  const ctx = new Ctx();
  const notes = [523.25, 659.25, 783.99, 1046.5];
  notes.forEach((freq, i)=>{
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine'; osc.frequency.value = freq;
    osc.connect(gain); gain.connect(ctx.destination);
    const start = ctx.currentTime + i*0.11;
    gain.gain.setValueAtTime(0, start);
    gain.gain.linearRampToValueAtTime(0.18, start+0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, start+0.35);
    osc.start(start); osc.stop(start+0.4);
  });
}
function maybeCelebrate(){
  if(state.screen==='room' && state.meta && state.meta.phase==='reveal'){
    const result = state.meta.lastRoundResult;
    if(result && result.tiles.some(t=>t.isPerfect) && state.lastCelebratedRound !== state.meta.round){
      state.lastCelebratedRound = state.meta.round;
      celebrate();
    }
  }
}

/* ---------------- actions ---------------- */
async function createRoom(){
  const nameEl = document.getElementById('nameInputCreate');
  const name = nameEl.value.trim();
  if(!name){ showError('名前を入力してください'); return; }
  state.busy = true; render(true);
  let code;
  for(let i=0;i<5;i++){
    code = genRoomCode();
    const existing = await sGet(kMeta(code));
    if(!existing) break;
  }
  const myId = genId();
  const ok1 = await sSet(kMeta(code), {
    hostId: myId, phase:'lobby', round:0, totalRounds:8, question:'',
    usedQuestions:[], gameId:null, lastRoundResult:null, createdAt: Date.now(),
    theme:'all', timeLimit:30, roundStartedAt:null, roundHistory:[]
  });
  const ok2 = await sSet(kPlayer(code, myId), { id:myId, name, score:0, joinedAt: Date.now() });
  state.busy = false;
  if(!ok1 || !ok2){ showError('ルーム作成に失敗しました'); return; }
  state.myId = myId; state.myName = name; state.roomCode = code; state.isHost = true;
  saveSession();
  await enterRoomPolling();
}

async function joinRoom(){
  const codeEl = document.getElementById('codeInputJoin');
  const nameEl = document.getElementById('nameInputJoin');
  const code = codeEl.value.trim().toUpperCase();
  const name = nameEl.value.trim();
  if(!code || !name){ showError('ルームコードと名前を入力してください'); return; }
  state.busy = true; render(true);
  const meta = await sGet(kMeta(code));
  if(!meta){ state.busy=false; showError('ルームが見つかりません'); return; }
  const pKeys = await sList(kPlayerPrefix(code));
  const existingPlayers = (await Promise.all(pKeys.map(k=>sGet(k)))).filter(Boolean);

  // 同じ名前のプレイヤーがすでにいる場合は、そのプレイヤーとして復帰できるようにする
  const nameNorm = name.toLowerCase();
  const match = existingPlayers.find(p => (p.name||'').toLowerCase() === nameNorm);
  if(match){
    state.busy = false;
    const wantsRejoin = confirm(`「${match.name}」という名前の参加者がすでにいます。このプレイヤーとして復帰しますか?`);
    if(wantsRejoin){
      state.myId = match.id; state.myName = match.name; state.roomCode = code; state.isHost = (meta.hostId === match.id);
      saveSession();
      await enterRoomPolling();
      return;
    }
  }

  if(meta.phase !== 'lobby'){ showError('このルームはすでにゲーム中です'); return; }
  if(existingPlayers.length >= MAX_PLAYERS){ showError('満員です(最大10人)'); return; }
  state.busy = true; render(true);
  const myId = genId();
  const ok = await sSet(kPlayer(code, myId), { id:myId, name, score:0, joinedAt: Date.now() });
  state.busy = false;
  if(!ok){ showError('参加に失敗しました'); return; }
  state.myId = myId; state.myName = name; state.roomCode = code; state.isHost = false;
  saveSession();
  await enterRoomPolling();
}

async function enterRoomPolling(){
  state.screen = 'room';
  await refreshRoomState();
  render(true);
  if(pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async ()=>{ await refreshRoomState(); maybeAutoReveal(); render(false); }, 2200);
  startClock();
}

function maybeAutoReveal(){
  const m = state.meta;
  if(!state.isHost || !m || m.phase!=='answering' || state.busy) return;
  if(state.players.length === 0) return;
  const allAnswered = state.players.every(p => !!state.answersMap[p.id]);
  if(allAnswered) hostReveal();
}

function startClock(){
  stopClock();
  clockTimer = setInterval(tickClock, 1000);
}
function stopClock(){
  if(clockTimer){ clearInterval(clockTimer); clockTimer = null; }
}
function tickClock(){
  const m = state.meta;
  if(!m || state.screen !== 'room') return;
  if(m.phase === 'answering' && m.timeLimit > 0 && m.roundStartedAt){
    const remain = Math.max(0, m.timeLimit - Math.floor((Date.now()-m.roundStartedAt)/1000));
    const secEl = document.getElementById('timerSeconds');
    if(secEl) secEl.textContent = remain;
    const wrapEl = document.getElementById('timerDisplay');
    if(wrapEl) wrapEl.classList.toggle('timer-warn', remain<=5);
    if(remain<=0 && state.isHost && !state.busy && state.timerRoundHandled !== m.round){
      state.timerRoundHandled = m.round;
      hostReveal();
    }
  }
}

async function refreshRoomState(){
  if(!state.roomCode) return;
  const code = state.roomCode;
  const meta = await sGet(kMeta(code));
  if(!meta) return;
  state.meta = meta;
  state.isHost = meta.hostId === state.myId;
  const pKeys = await sList(kPlayerPrefix(code));
  const players = (await Promise.all(pKeys.map(k=>sGet(k)))).filter(Boolean);
  players.sort((a,b)=> a.joinedAt - b.joinedAt);

  // ホストに強制退出させられた場合の検知
  if(state.screen==='room' && state.myId && !players.some(p=>p.id===state.myId)){
    if(pollTimer) clearInterval(pollTimer);
    stopClock();
    clearSession();
    alert('ホストによってルームから退出させられました。');
    state = { screen:'home', tab:'create', myId:null, myName:'', roomCode:null, isHost:false,
      meta:null, players:[], answersMap:{}, myAnswerSubmitted:false, errorMsg:'', busy:false,
      reactionsMap:{}, myReactions:{}, showHistory:false, lastCelebratedRound:null,
      prefillCode:'', timerRoundHandled:null, openMenuPlayerId:null };
    lastRenderKey = null;
    render(true);
    return;
  }

  state.players = players;

  if((meta.phase==='answering' || meta.phase==='reveal') && meta.gameId){
    const aKeys = await sList(kAnswerPrefix(code, meta.gameId, meta.round));
    const answersArr = await Promise.all(aKeys.map(async k=>{
      const v = await sGet(k);
      const pid = k.split(':').pop();
      return v ? [pid, v] : null;
    }));
    const map = {};
    answersArr.filter(Boolean).forEach(([pid,v])=>{ map[pid]=v; });
    state.answersMap = map;
    state.myAnswerSubmitted = !!map[state.myId];
  }

  if(meta.phase==='reveal' && meta.gameId){
    const rKeys = await sList(kReactionPrefix(code, meta.gameId, meta.round));
    const agg = {}; const mine = {};
    await Promise.all(rKeys.map(async k=>{
      const val = await sGet(k);
      if(val==null) return;
      const lastSeg = k.split(':').pop(); // "tileIdx_playerId"
      const underscoreAt = lastSeg.indexOf('_');
      const tileIdx = lastSeg.slice(0, underscoreAt);
      const playerId = lastSeg.slice(underscoreAt+1);
      if(!agg[tileIdx]) agg[tileIdx] = {};
      agg[tileIdx][val] = (agg[tileIdx][val]||0)+1;
      if(playerId === state.myId) mine[tileIdx] = val;
    }));
    state.reactionsMap = agg; state.myReactions = mine;
  } else {
    state.reactionsMap = {}; state.myReactions = {};
  }
}

async function startGame(){
  const roundsSel = document.getElementById('roundsSelect');
  const totalRounds = parseInt(roundsSel.value, 10);
  const themeSel = document.getElementById('themeSelect');
  const theme = themeSel ? themeSel.value : 'all';
  const tlSel = document.getElementById('timeLimitSelect');
  const timeLimit = tlSel ? parseInt(tlSel.value, 10) : 0;

  const draftMeta = { ...state.meta, theme, usedQuestions:[] };
  const q = pickQuestion(draftMeta);
  const gameId = Date.now().toString(36) + genId(4);
  const meta = { ...state.meta, phase:'answering', round:1, totalRounds, question:q,
    usedQuestions:[q], gameId, lastRoundResult:null, theme, timeLimit,
    roundStartedAt: Date.now(), roundHistory:[] };
  state.busy = true; render(false);
  await sSet(kMeta(state.roomCode), meta);
  state.busy = false;
  state.timerRoundHandled = null;
  await refreshRoomState(); render(true);
}

async function submitAnswer(){
  const input = document.getElementById('answerBox');
  const text = input.value.trim();
  if(!text){ showError('回答を入力してください'); return; }
  const { meta, roomCode, myId } = state;
  state.busy = true; render(false);
  await sSet(kAnswer(roomCode, meta.gameId, meta.round, myId), { answer:text, submittedAt: Date.now() });
  state.busy = false; draftAnswer='';
  await refreshRoomState(); render(true);
  maybeAutoReveal();
}

async function hostReveal(){
  state.busy = true; render(false);
  await refreshRoomState();
  const { players, answersMap, meta, roomCode } = state;
  const { tiles, pointsMap } = computeTiles(players, answersMap);
  for(const p of players){
    const pts = pointsMap[p.id] || 0;
    if(pts>0){ await sSet(kPlayer(roomCode, p.id), { ...p, score: p.score + pts }); }
  }
  const tilesForResult = tiles.map(t=>({
    answer:t.answer, isMatch:t.isMatch, isPerfect:t.isPerfect, pts:t.pts, color:t.color,
    ids:t.ids, names: t.ids.map(id => (players.find(p=>p.id===id)||{}).name || '?')
  }));
  const answersSnapshot = {};
  players.forEach(p=>{ const a = answersMap[p.id]; answersSnapshot[p.id] = a ? { submittedAt:a.submittedAt } : null; });
  const historyEntry = { round: meta.round, question: meta.question, tiles: tilesForResult,
    startedAt: meta.roundStartedAt || null, answers: answersSnapshot };
  const newMeta = { ...meta, phase:'reveal',
    lastRoundResult: { question: meta.question, tiles: tilesForResult },
    roundHistory: [ ...(meta.roundHistory||[]), historyEntry ] };
  await sSet(kMeta(roomCode), newMeta);
  state.busy = false;
  await refreshRoomState(); render(true);
}

async function sendReaction(tileIdx, emoji){
  const { roomCode, meta, myId } = state;
  if(!meta || meta.phase!=='reveal') return;
  const key = kReaction(roomCode, meta.gameId, meta.round, tileIdx, myId);
  const current = state.myReactions[tileIdx];
  if(current === emoji){ await sDelete(key); }
  else{ await sSet(key, emoji); }
  await refreshRoomState(); render(true);
}

async function nextQuestion(){
  state.busy = true; render(false);
  await refreshRoomState();
  const meta = state.meta;
  const nextRound = meta.round + 1;
  if(nextRound > meta.totalRounds){
    await sSet(kMeta(state.roomCode), { ...meta, phase:'finished' });
  } else {
    const q = pickQuestion(meta);
    await sSet(kMeta(state.roomCode), { ...meta, phase:'answering', round: nextRound, question:q,
      usedQuestions:[...meta.usedQuestions, q], lastRoundResult:null, roundStartedAt: Date.now() });
  }
  state.busy = false;
  state.timerRoundHandled = null;
  await refreshRoomState(); render(true);
}

async function playAgain(){
  state.busy = true; render(false);
  await refreshRoomState();
  for(const p of state.players){
    await sSet(kPlayer(state.roomCode, p.id), { ...p, score:0 });
  }
  await sSet(kMeta(state.roomCode), { ...state.meta, phase:'lobby', round:0, question:'',
    usedQuestions:[], gameId:null, lastRoundResult:null, roundHistory:[] });
  state.busy = false;
  await refreshRoomState(); render(true);
}

async function kickPlayer(id){
  if(!state.isHost || id === state.myId) return;
  const target = state.players.find(p=>p.id===id);
  if(!target) return;
  if(!confirm(`「${target.name}」さんを退出させますか?`)) return;
  state.openMenuPlayerId = null;
  state.busy = true; render(false);
  await sDelete(kPlayer(state.roomCode, id));
  state.busy = false;
  await refreshRoomState(); render(true);
}

async function leaveRoom(){
  if(pollTimer) clearInterval(pollTimer);
  stopClock();
  if(state.roomCode && state.myId){ await sDelete(kPlayer(state.roomCode, state.myId)); }
  clearSession();
  state = { screen:'home', tab:'create', myId:null, myName:'', roomCode:null, isHost:false,
    meta:null, players:[], answersMap:{}, myAnswerSubmitted:false, errorMsg:'', busy:false,
    reactionsMap:{}, myReactions:{}, showHistory:false, lastCelebratedRound:null,
    prefillCode:'', timerRoundHandled:null, openMenuPlayerId:null };
  lastRenderKey = null;
  render(true);
}

function copyCode(){
  if(!state.roomCode) return;
  navigator.clipboard?.writeText(state.roomCode).catch(()=>{});
  showError('コードをコピーしました');
}
function copyInviteLink(){
  if(!state.roomCode) return;
  const url = `${location.origin}${location.pathname}?room=${state.roomCode}`;
  navigator.clipboard?.writeText(url).catch(()=>{});
  showError('招待リンクをコピーしました');
}

async function transferHost(targetId){
  if(!state.isHost || targetId===state.myId) return;
  const target = state.players.find(p=>p.id===targetId);
  if(!target) return;
  if(!confirm(`ホスト権限を「${target.name}」さんに譲りますか?`)) return;
  state.openMenuPlayerId = null;
  state.busy = true; render(false);
  await sSet(kMeta(state.roomCode), { ...state.meta, hostId: targetId });
  state.busy = false;
  await refreshRoomState(); render(true);
}

function setTab(t){ state.tab = t; render(true); }
function onAnswerInput(e){ draftAnswer = e.target.value; }
function toggleHistory(){ state.showHistory = !state.showHistory; render(true); }
function togglePlayerMenu(id){
  state.openMenuPlayerId = (state.openMenuPlayerId === id) ? null : id;
  render(true);
}
function closePlayerMenu(){
  if(state.openMenuPlayerId !== null){ state.openMenuPlayerId = null; render(true); }
}

/* ---------------- render ---------------- */
function esc(s){ const d=document.createElement('div'); d.textContent = s==null?'':String(s); return d.innerHTML; }
function colorFor(idx){ return PLAYER_COLORS[idx % PLAYER_COLORS.length]; }

function computeRenderKey(){
  if(state.screen==='home') return `home|${state.tab}|${state.prefillCode}`;
  const m = state.meta;
  return `room|${m?m.phase:''}|${m?m.round:''}|${state.myAnswerSubmitted}|${state.players.length}|${m?m.hostId:''}|${state.showHistory}|${state.openMenuPlayerId}`;
}

function render(force){
  const key = computeRenderKey();
  if(force || key !== lastRenderKey){
    lastRenderKey = key;
    document.getElementById('app').innerHTML = screenHTML();
  } else {
    updateLiveRegions();
  }
  maybeCelebrate();
}

function updateLiveRegions(){
  if(state.screen==='room' && state.meta && state.meta.phase==='answering'){
    const el = document.getElementById('statusList');
    if(el) el.innerHTML = statusListHTML();
  }
  const err = document.getElementById('errorToastSlot');
  if(err) err.innerHTML = state.errorMsg ? `<div class="error-toast">${esc(state.errorMsg)}</div>` : '';
}

function errorToastHTML(){
  return `<div id="errorToastSlot">${state.errorMsg ? `<div class="error-toast">${esc(state.errorMsg)}</div>` : ''}</div>`;
}

function brandHTML(sub){
  return `<div class="brand">
    <span class="mark">MATCH GAME</span>
    <h1>一致ゲーム</h1>
    <p>${sub}</p>
  </div>`;
}

function sidebarHTML(){
  const m = state.meta;
  const showScore = m.phase !== 'lobby';
  const list = state.players.map((p,i)=>{
    const isMe = p.id === state.myId;
    const isPlayerHost = m.hostId === p.id;
    const menuOpen = state.openMenuPlayerId === p.id;
    const canManage = state.isHost && !isMe;
    return `
    <div class="side-player">
      <span class="dot" style="background:${colorFor(i)}"></span>
      <span class="side-player-name">${esc(p.name)}${isMe ? ' (自分)' : ''}</span>
      ${isPlayerHost ? '<span class="host-badge">HOST</span>' : ''}
      ${showScore ? `<span class="side-player-score">${p.score}pt</span>` : ''}
      ${canManage ? `
      <div class="player-menu-wrap">
        <button class="mini-btn" onclick="togglePlayerMenu('${p.id}')" title="このプレイヤーを管理" aria-expanded="${menuOpen}">⋯</button>
        ${menuOpen ? `
        <div class="player-dropdown" role="menu">
          <button role="menuitem" onclick="transferHost('${p.id}')">👑 ホストにする</button>
          <button role="menuitem" class="danger" onclick="kickPlayer('${p.id}')">🚪 退出させる</button>
        </div>` : ''}
      </div>` : ''}
    </div>`;
  }).join('');
  const hasHistory = (m.roundHistory||[]).length > 0;
  const menuOverlay = state.openMenuPlayerId !== null ? `<div class="menu-backdrop" onclick="closePlayerMenu()"></div>` : '';
  return `
  <div class="panel side-panel">
    <h2>参加者 <span style="color:var(--text-dim); font-weight:400;">(${state.players.length}/${MAX_PLAYERS})</span></h2>
    <div id="sidebarPlayerList">${list || '<p class="empty-note">まだ誰もいません</p>'}</div>
    ${hasHistory ? `<button class="btn btn-outline" style="margin-top:12px;" onclick="toggleHistory()">📜 ラウンド履歴</button>` : ''}
  </div>
  ${menuOverlay}`;
}

function screenHTML(){
  let out;
  if(state.screen==='home'){
    out = `<div class="home-wrap">${homeHTML()}</div>`;
  } else if(!state.meta){
    out = `<div class="panel"><p>読み込み中...</p></div>`;
  } else {
    let mainHTML;
    switch(state.meta.phase){
      case 'lobby': mainHTML = lobbyHTML(); break;
      case 'answering': mainHTML = answeringHTML(); break;
      case 'reveal': mainHTML = revealHTML(); break;
      case 'finished': mainHTML = finishedHTML(); break;
      default: mainHTML = `<div class="panel"><p>読み込み中...</p></div>`;
    }
    out = `<div class="room-layout"><div class="col-spacer" aria-hidden="true"></div><div class="main-col">${mainHTML}</div><div class="side-col">${sidebarHTML()}</div></div>`;
  }
  if(state.showHistory && state.screen==='room' && state.meta) out += historyOverlayHTML();
  return out;
}

    `}
  </div>
  <div class="footer-note">みんなで同じお題に答えて、答えが一致するとポイント獲得。<br>全員が同じ答えなら全員にボーナス!<br>画面を閉じても、同じ名前でもう一度参加すれば復帰できます。</div>
  `;
}

function statusListHTML(){
  return state.players.map(p=>{
    const done = !!state.answersMap[p.id];
    return `<div class="status-pill ${done?'done':''}">${done?'✅':'⏳'} ${esc(p.name)}</div>`;
  }).join('');
}

function lobbyHTML(){
  const meta = state.meta;
  return `
  ${brandHTML('友達を招待して、参加者がそろったらゲームを開始しよう。')}
  ${errorToastHTML()}
  <div class="panel">
    <div class="code-display">
      <div class="label">ROOM CODE</div>
      <div class="code">${esc(state.roomCode)}</div>
      <div class="row">
        <button class="btn btn-outline" onclick="copyCode()">コードをコピー</button>
        <button class="btn btn-outline" onclick="copyInviteLink()">招待リンクをコピー</button>
      </div>
    </div>
    <p class="empty-note" style="text-align:left; margin-bottom:14px;">右側に参加者一覧が表示されます。人数がそろったら開始しましょう。</p>
    ${state.isHost ? `
      <div class="field">
        <label>ラウンド数</label>
        <select id="roundsSelect">
          <option value="5">5問</option>
          <option value="8" selected>8問</option>
          <option value="10">10問</option>
          <option value="12">12問</option>
        </select>
      </div>
      <div class="field">
        <label>お題テーマ</label>
        <select id="themeSelect">
          <option value="all">${THEME_LABELS.all}</option>
          <option value="food">${THEME_LABELS.food}</option>
          <option value="travel">${THEME_LABELS.travel}</option>
          <option value="preference">${THEME_LABELS.preference}</option>
          <option value="daily">${THEME_LABELS.daily}</option>
        </select>
      </div>
      <div class="field">
        <label>回答タイマー</label>
        <select id="timeLimitSelect">
          <option value="0">なし</option>
          <option value="20">20秒</option>
          <option value="30" selected>30秒</option>
          <option value="45">45秒</option>
          <option value="60">60秒</option>
        </select>
      </div>
      <button class="btn btn-gold" ${state.players.length<2 || state.busy ? 'disabled':''} onclick="startGame()">
        ${state.players.length<2 ? '2人以上で開始できます' : (state.busy?'開始中...':'ゲーム開始')}
      </button>
    ` : `<p class="empty-note">ホストがゲームを開始するのを待っています...</p>`}
  </div>
  <button class="link-btn" onclick="leaveRoom()">ルームを退出する</button>
  `;
}

function answeringHTML(){
  const m = state.meta;
  const answeredCount = state.players.filter(p=>state.answersMap[p.id]).length;
  const remainNow = m.timeLimit>0 ? Math.max(0, m.timeLimit - Math.floor((Date.now()-(m.roundStartedAt||Date.now()))/1000)) : 0;
  const timerHTML = m.timeLimit>0 ? `<div class="timer-box ${remainNow<=5?'timer-warn':''}" id="timerDisplay">⏱ 残り <span id="timerSeconds">${remainNow}</span>秒</div>` : '';
  return `
  ${brandHTML('')}
  ${errorToastHTML()}
  <div class="panel">
    <div class="round-tag">ROUND ${m.round} / ${m.totalRounds}</div>
    ${timerHTML}
    <div class="eyebrow">お題</div>
    <div class="question">${esc(m.question)}</div>
    ${state.myAnswerSubmitted ? `
      <div class="submitted-box">
        <div class="big">送信しました!</div>
        <p style="color:var(--text-dim); margin:6px 0 0; font-size:13px;">他のみんなの回答を待っています...</p>
      </div>
    ` : `
      <input id="answerBox" class="answer-input" maxlength="20" placeholder="ここに回答を入力" value="${esc(draftAnswer)}" oninput="onAnswerInput(event)" onkeydown="if(event.key==='Enter') submitAnswer()">
      <button class="btn btn-gold" ${state.busy?'disabled':''} onclick="submitAnswer()">${state.busy?'送信中...':'回答を送信する'}</button>
    `}
    <h2 style="margin-top:20px;">回答状況 (${answeredCount}/${state.players.length})</h2>
    <div class="status-list" id="statusList">${statusListHTML()}</div>
    ${state.isHost ? `
      <button class="btn btn-outline" style="margin-top:8px;" ${state.busy?'disabled':''} onclick="hostReveal()">
        ${state.busy?'集計中...':'今すぐ結果を見る(未回答の人がいてもOK)'}
      </button>
      <p class="empty-note" style="margin-top:8px;">全員が回答するか、タイマーが0になると自動で結果画面に切り替わります</p>
    ` : ''}
  </div>
  <button class="link-btn" onclick="leaveRoom()">ルームを退出する</button>
  `;
}

function scoreboardHTML(){
  const sorted = [...state.players].sort((a,b)=> b.score - a.score);
  return sorted.map((p,i)=> `
    <div class="score-row ${i===0 && p.score>0 ? 'top1':''}">
      <div class="rank">${i+1}</div>
      <div class="name">${esc(p.name)}</div>
      <div class="pts">${p.score}pt</div>
    </div>
  `).join('');
}

function reactionRowHTML(idx){
  const agg = state.reactionsMap[idx] || {};
  const mine = state.myReactions[idx];
  return `<div class="reaction-row">${REACTION_EMOJI.map(e=>`
    <button class="reaction-btn ${mine===e?'mine':''}" onclick="sendReaction(${idx}, '${e}')">${e}${agg[e]?`<span class="reaction-count">${agg[e]}</span>`:''}</button>
  `).join('')}</div>`;
}

function revealHTML(){
  const m = state.meta;
  const result = m.lastRoundResult;
  const tilesHTML = result ? result.tiles.map((t, idx) => `
    <div class="tile ${t.isMatch?'match':''}" style="--tile-color:${t.color||'transparent'}">
      <div class="answer-text">${esc(t.answer)}</div>
      <div class="who-row">
        <div class="who">${t.names.map(esc).join(' / ')}</div>
        ${t.isMatch ? `<span class="badge-match">${t.isPerfect?'全員一致 MATCH!':'MATCH ×'+t.names.length}</span>` : `<span class="badge-pts">+0pt</span>`}
      </div>
      ${t.isMatch ? `<div style="margin-top:6px; text-align:right;" class="badge-pts">+${t.pts}pt</div>` : ''}
      ${reactionRowHTML(idx)}
    </div>
  `).join('') : '<p class="empty-note">集計中...</p>';

  return `
  ${brandHTML('')}
  ${errorToastHTML()}
  <div class="panel">
    <div class="round-tag">ROUND ${m.round} / ${m.totalRounds} の結果</div>
    <div class="question" style="font-size:19px;">${esc(result ? result.question : m.question)}</div>
    ${tilesHTML}
  </div>
  <div class="panel">
    <h2>現在のスコア</h2>
    <div class="scoreboard" id="scoreboard">${scoreboardHTML()}</div>
    ${state.isHost ? `
      <button class="btn btn-gold" ${state.busy?'disabled':''} onclick="nextQuestion()">
        ${state.busy?'処理中...':(m.round>=m.totalRounds ? '最終結果を見る' : '次のお題へ')}
      </button>
    ` : `<p class="empty-note">ホストが次に進めるのを待っています...</p>`}
  </div>
  <button class="link-btn" onclick="leaveRoom()">ルームを退出する</button>
  `;
}

function finishedHTML(){
  const sorted = [...state.players].sort((a,b)=> b.score - a.score);
  const winner = sorted[0];
  const badges = computeBadges(state.meta, state.players);
  const badgesHTML = badges.length ? `
  <div class="panel">
    <h2>🏅 称号</h2>
    ${badges.map(b=>`<div class="badge-card"><div class="emoji">${b.emoji}</div><div class="info"><b>${esc(b.title)} — ${esc(b.name)}</b><span>${esc(b.desc)}</span></div></div>`).join('')}
  </div>` : '';
  return `
  ${brandHTML('全ラウンド終了!お疲れさまでした。')}
  ${errorToastHTML()}
  <div class="panel">
    <div class="final-hero">
      <div class="crown">🏆</div>
      <div class="winner">${winner ? esc(winner.name) : '???'} さんの勝利!</div>
    </div>
    <h2>最終スコア</h2>
    <div class="scoreboard">${scoreboardHTML()}</div>
    ${state.isHost ? `
      <button class="btn btn-gold" ${state.busy?'disabled':''} onclick="playAgain()">${state.busy?'準備中...':'もう一度あそぶ'}</button>
    ` : `<p class="empty-note">ホストが「もう一度あそぶ」を選ぶのを待っています...</p>`}
  </div>
  ${badgesHTML}
  <button class="link-btn" onclick="leaveRoom()">ルームを退出する</button>
  `;
}

function historyOverlayHTML(){
  const history = (state.meta && state.meta.roundHistory) || [];
  const roundsHTML = history.length ? history.map(h=>{
    const lines = (h.tiles||[]).map(t=>{
      const color = t.isMatch ? (t.color || 'var(--gold)') : 'var(--text-dim)';
      const badge = t.isMatch ? `<span style="color:var(--gold); font-weight:700;">+${t.pts}pt</span>` : '';
      return `<div class="history-line"><b style="color:${color}">${esc(t.answer)}</b> — ${t.names.map(esc).join(' / ')} ${badge}</div>`;
    }).join('');
    return `<div class="history-round">
      <div class="round-tag">ROUND ${h.round}</div>
      <div style="font-weight:700; margin-bottom:6px;">${esc(h.question)}</div>
      ${lines}
    </div>`;
  }).join('') : '<p class="empty-note">まだラウンド履歴がありません</p>';

  return `<div class="overlay" onclick="if(event.target===this) toggleHistory()">
    <div class="panel overlay-panel">
      <h2>📜 ラウンド履歴</h2>
      ${roundsHTML}
      <button class="btn btn-outline" style="margin-top:14px;" onclick="toggleHistory()">閉じる</button>
    </div>
  </div>`;
}

/* ---------------- init ---------------- */
async function init(){
  const params = new URLSearchParams(location.search);
  const urlRoom = (params.get('room')||'').toUpperCase().trim();

  const session = loadSession();
  if(session && session.roomCode && session.myId){
    const meta = await sGet(kMeta(session.roomCode));
    const player = meta ? await sGet(kPlayer(session.roomCode, session.myId)) : null;
    if(meta && player){
      state.myId = session.myId; state.myName = player.name; state.roomCode = session.roomCode;
      state.isHost = meta.hostId === session.myId;
      await enterRoomPolling();
      return;
    } else {
      clearSession();
    }
  }

  if(urlRoom){ state.tab = 'join'; state.prefillCode = urlRoom; }
  render(true);
}
init();
</script>
</body>
</html>
